<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My FiveM NUI</title>
    <style>
        body {
            display: none; /* Hidden by default */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            background: transparent;
        }
        .container {
            width: 350px;
            background: rgba(20, 20, 20, 0.95);
            color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00bcd4;
        }
        p {
            font-size: 14px;
            color: #b0bec5;
            margin-bottom: 30px;
        }
        button {
            padding: 12px 24px;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0097a7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NUI Demonstration</h1>
        <p>This UI is running natively in your FiveM client using local HTML resources.</p>
        <button id="close-btn">Close Interface</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
